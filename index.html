<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Legacy Console Edition Launcher</title>
<link rel="icon" href="title.png">

<style>
@font-face {
    font-family: Minecraft;
    src: url("Minecraft.ttf");
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100%;
    height: 100vh;
    font-family: Minecraft, Arial, sans-serif;
    color: white;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

.container {
    text-align: center;
    z-index: 10;
}

.banner {
    margin-bottom: 20px;
    animation: fadeIn 2s ease-in;
}

.banner img {
    max-width: 600px;
    height: auto;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
}

.title {
    font-size: 48px;
    margin-bottom: 60px;
    text-shadow: 3px 3px 8px black;
    animation: fadeIn 2s ease-in;
}

.buttons-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.button {
    display: inline-block;
    width: 600px;
    padding: 25px 40px;
    font-size: 32px;
    background-image: url("btn.png");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    background-position: center;
    color: white;
    text-decoration: none;
    text-shadow: 2px 2px 4px black;
    cursor: pointer;
    border: none;
    font-family: Minecraft;
    transition: all 0.15s ease;
    animation: fadeIn 2s ease-in;
    user-select: none;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.button:hover {
    transform: scale(1.05);
    color: #FFFF00;
    text-shadow: 2px 2px 4px black, 0 0 10px rgba(255, 255, 0, 0.3);
}

.button:active {
    transform: scale(0.98);
}

.button.greyed {
    opacity: 0.5;
    pointer-events: none;
    color: #CCCCCC;
}

.button.greyed:hover {
    transform: scale(1);
    color: #CCCCCC;
    text-shadow: 2px 2px 4px black;
}

.section-title {
    font-size: 36px;
    margin-top: 40px;
    margin-bottom: 30px;
    text-shadow: 2px 2px 4px black;
    animation: fadeIn 2s ease-in;
}

.versions-list {
    margin-top: 30px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease-in-out;
    animation: fadeIn 2s ease-in;
}

.versions-list.expanded {
    max-height: 1000px;
}

.version-item {
    background: rgba(0, 0, 0, 0.3);
    margin: 10px auto;
    padding: 15px;
    width: 600px;
    border-radius: 5px;
    border: 2px solid rgba(255, 255, 255, 0.2);
}

.version-item a {
    color: white;
    text-decoration: none;
    font-size: 20px;
    display: inline-block;
    transition: all 0.15s ease;
    text-shadow: 2px 2px 4px black;
}

.version-item a:hover {
    color: #FFFF00;
    transform: scale(1.05);
    text-shadow: 2px 2px 4px black, 0 0 10px rgba(255, 255, 0, 0.3);
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

/* Responsive design */
@media (max-width: 768px) {
    .button {
        width: 90%;
        font-size: 24px;
    }
    
    .title {
        font-size: 32px;
    }
    
    .banner img {
        max-width: 80%;
    }
}
</style>
</head>

<body>
<video class="video-background" autoplay muted loop playbackRate="1">
    <source src="background.mp4" type="video/mp4">
</video>

<div class="container">
    <div class="banner">
        <img src="banner.png" alt="Minecraft Legacy Console Edition">
    </div>
    
    <div class="title">
        Minecraft Legacy Console Edition Launcher
    </div>
    
    <div class="buttons-container">
        <a href="https://github.com/alynobel/MCLCEL/releases/download/mclce/LegacyLauncherBETA3.exe" class="button">
            Download Latest
        </a>
        
        <a href="https://github.com/alynobel/MCLCEL/releases/download/mclce/LegacyLauncherBETA2.exe" class="button">
            Download Previous Version
        </a>
        
        <button id="showVersionsBtn" class="button" style="margin-top: 20px;">
            Show All Versions
        </button>
        
        <div id="versionsList" class="versions-list">
            <div class="version-item">
                <a href="https://github.com/alynobel/MCLCEL/releases/download/mclce/LegacyLauncherBETA3.exe">
                    LegacyLauncherBETA3.exe


            <div class="version-item">
                <a href="https://github.com/alynobel/MCLCEL/releases/download/mclce/LegacyLauncherBETA2.exe">
                    LegacyLauncherBETA2.exe


            <div class="version-item">
                <a href="https://github.com/alynobel/MCLCEL/releases/download/mclce/LegacyLauncherBETA1.exe">
                    LegacyLauncherBETA1.exe


                </a>
            </div>
        </div>
    </div>
</div>

<script>
// Set video playback rate to normal
window.addEventListener('load', function() {
    const video = document.querySelector('.video-background');
    if (video) {
        video.playbackRate = 1;
    }
});

// Toggle versions list
const showVersionsBtn = document.getElementById('showVersionsBtn');
const versionsList = document.getElementById('versionsList');

showVersionsBtn.addEventListener('click', function(e) {
    e.preventDefault();
    versionsList.classList.toggle('expanded');
    showVersionsBtn.textContent = versionsList.classList.contains('expanded') ? 'Hide All Versions' : 'Show All Versions';
});

// Ensure buttons work properly
document.querySelectorAll('.button').forEach(button => {
    button.addEventListener('click', function(e) {
        if (this.classList.contains('greyed')) {
            e.preventDefault();
        }
    });
});
</script>

</body>
</html>
