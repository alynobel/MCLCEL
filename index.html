<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Minecraft Legacy Console Edition (XBOX 360) for Windows Launcher</title>

<link rel="icon" type="image/png" href="title.png">

<style>

@font-face {
    font-family: Minecraft;
    src: url("Minecraft.ttf");
}

body{
    margin:0;
    background-image:url("systemback.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
    font-family:Minecraft, sans-serif;
    color:white;
    text-align:center;
}

.banner{
    margin-top:40px;
}

.banner img{
    max-width:80%;
}

.title{
    font-size:42px;
    margin-top:30px;
    text-shadow:3px 3px 6px black;
}

.download{
    margin-top:80px;
}

.button-container{
    position:relative;
    display:inline-block;
}

.button-container img{
    width:520px; /* bigger button */
}

.button-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:42px; /* bigger text */
    color:white;
    text-shadow:2px 2px 4px black;
    white-space:nowrap;
    pointer-events:none;
}

.button-container:hover{
    transform:scale(1.1);
    transition:0.15s;
}
</style>
</head>

<body>

<div class="banner">
<img src="banner.png">
</div>

<div class="title">
Minecraft Legacy Console Edition (XBOX 360) for Windows Launcher
</div>

<div class="download">
<a href="LegacyLauncher.exe" download>
<div class="button-container">
<img src="btn.png">
<div class="button-text">Download Launcher</div>
</div>
</a>
</div>

</body>

</html>
